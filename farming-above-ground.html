<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヤマモモ地上部断面図</title>
    <style>
        body {
            margin: 0;
            padding: 16px;
            background: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 24px;
        }
        svg {
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <!-- 矢印マーカー（先に定義） -->
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#FF6347"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="10 0, 0 5, 10 10" fill="#FF6347"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#F4A460"/>
    </marker>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#8B4513"/>
    </marker>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#4CAF50"/>
    </marker>
    <marker id="arrow6" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#000"/>
    </marker>
    <marker id="arrow7" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="10 0, 0 5, 10 10" fill="#000"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="900" height="650" fill="#E8F5E9"/>

  <!-- 元の地表面（粘土質土壌） -->
  <rect x="0" y="350" width="900" height="300" fill="#8B7355"/>

  <!-- 元の地表面ライン -->
  <line x1="0" y1="350" x2="900" y2="350" stroke="#000" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="10" y="340" font-size="14" font-weight="bold">元の地表面</text>

  <!-- 高植え部分の土盛り（改良土） -->
  <ellipse cx="450" cy="350" rx="200" ry="60" fill="#654321" opacity="0.8"/>
  <ellipse cx="450" cy="290" rx="180" ry="50" fill="#654321" opacity="0.8"/>

  <!-- 新しい地表面（高植え後）のライン -->
  <path d="M 250 350 Q 350 280, 450 280 Q 550 280, 650 350"
        stroke="#000" stroke-width="3" fill="none"/>

  <!-- 高植えの高さ表示 -->
  <line x1="700" y1="350" x2="700" y2="285" stroke="#FF6347" stroke-width="3"
        marker-end="url(#arrow1)" marker-start="url(#arrow2)"/>
  <text x="710" y="320" font-size="16" fill="#FF6347" font-weight="bold">+10-20cm</text>
  <text x="710" y="340" font-size="14" fill="#FF6347">(高植え)</text>

  <!-- ヤマモモの幹 -->
  <rect x="440" y="150" width="20" height="140" fill="#5D4037" rx="3"/>
  <ellipse cx="450" cy="150" rx="10" ry="5" fill="#5D4037"/>

  <!-- 樹冠（簡略版） -->
  <ellipse cx="450" cy="120" rx="80" ry="60" fill="#2E7D32" opacity="0.7"/>
  <ellipse cx="420" cy="100" rx="60" ry="50" fill="#388E3C" opacity="0.7"/>
  <ellipse cx="480" cy="100" rx="60" ry="50" fill="#388E3C" opacity="0.7"/>

  <!-- Zone 1: 砂地（幹周り0-15cm、傾斜つき） -->
  <ellipse cx="450" cy="285" rx="30" ry="15" fill="#F4A460" stroke="#D2691E" stroke-width="2"/>
  <path d="M 420 285 Q 440 295, 450 295 Q 460 295, 480 285"
        fill="#F4A460" stroke="#D2691E" stroke-width="2"/>

  <!-- Zone 2: バークチップ（15-50cm、10cm厚） -->
  <ellipse cx="450" cy="295" rx="100" ry="30" fill="#8B4513" stroke="#654321" stroke-width="2"/>
  <ellipse cx="450" cy="285" rx="100" ry="25" fill="#A0522D" stroke="#654321" stroke-width="2"/>
  <!-- バークチップのテクスチャ -->
  <ellipse cx="420" cy="290" rx="8" ry="4" fill="#654321" opacity="0.5"/>
  <ellipse cx="470" cy="288" rx="10" ry="5" fill="#654321" opacity="0.5"/>
  <ellipse cx="440" cy="295" rx="7" ry="3" fill="#654321" opacity="0.5"/>
  <ellipse cx="490" cy="292" rx="9" ry="4" fill="#654321" opacity="0.5"/>

  <!-- Zone 3: クローバー（50-150cm、リビングマルチ） -->
  <ellipse cx="450" cy="305" rx="300" ry="50" fill="#4CAF50" stroke="#2E7D32" stroke-width="2" opacity="0.6"/>
  <ellipse cx="450" cy="295" rx="300" ry="40" fill="#66BB6A" stroke="#2E7D32" stroke-width="2" opacity="0.6"/>
  <!-- クローバーの葉模様 -->
  <circle cx="350" cy="300" r="5" fill="#1B5E20" opacity="0.5"/>
  <circle cx="380" cy="295" r="4" fill="#1B5E20" opacity="0.5"/>
  <circle cx="410" cy="305" r="5" fill="#1B5E20" opacity="0.5"/>
  <circle cx="490" cy="300" r="4" fill="#1B5E20" opacity="0.5"/>
  <circle cx="520" cy="295" r="5" fill="#1B5E20" opacity="0.5"/>
  <circle cx="550" cy="305" r="4" fill="#1B5E20" opacity="0.5"/>

  <!-- Zone 4: 粘土団子エリア（150cm以遠） -->
  <rect x="0" y="330" width="150" height="30" fill="#9CCC65" opacity="0.7"/>
  <rect x="750" y="330" width="150" height="30" fill="#9CCC65" opacity="0.7"/>
  <text x="50" y="350" font-size="12" fill="#33691E" font-weight="bold">粘土団子</text>
  <text x="780" y="350" font-size="12" fill="#33691E" font-weight="bold">粘土団子</text>

  <!-- 寸法線 -->
  <!-- 幹周り0-15cm -->
  <line x1="450" y1="400" x2="480" y2="400" stroke="#F4A460" stroke-width="2"
        marker-end="url(#arrow3)"/>
  <text x="485" y="405" font-size="14" fill="#D2691E" font-weight="bold">15cm（砂）</text>

  <!-- バークチップ 15-50cm -->
  <line x1="480" y1="420" x2="550" y2="420" stroke="#8B4513" stroke-width="2"
        marker-end="url(#arrow4)"/>
  <text x="480" y="415" font-size="14" fill="#654321" font-weight="bold">50cm</text>
  <text x="480" y="430" font-size="12" fill="#654321">(バークチップ)</text>

  <!-- クローバー 50-150cm -->
  <line x1="550" y1="440" x2="750" y2="440" stroke="#4CAF50" stroke-width="2"
        marker-end="url(#arrow5)"/>
  <text x="600" y="435" font-size="14" fill="#2E7D32" font-weight="bold">150cm</text>
  <text x="600" y="450" font-size="12" fill="#2E7D32">(クローバー)</text>

  <!-- 全体の幅 -->
  <line x1="150" y1="550" x2="750" y2="550" stroke="#000" stroke-width="2"
        marker-end="url(#arrow6)" marker-start="url(#arrow7)"/>
  <text x="420" y="545" font-size="16" font-weight="bold">植栽エリア直径約5-6m</text>

  <!-- ラベル -->
  <text x="450" y="290" font-size="12" text-anchor="middle" fill="#D2691E" font-weight="bold">砂（傾斜）</text>
  <text x="370" y="290" font-size="12" fill="#654321" font-weight="bold">バークチップ</text>
  <text x="530" y="290" font-size="12" fill="#654321" font-weight="bold">10cm厚</text>
  <text x="250" y="305" font-size="12" fill="#1B5E20" font-weight="bold">クローバー</text>
  <text x="620" y="305" font-size="12" fill="#1B5E20" font-weight="bold">リビングマルチ</text>

  <!-- 改良土ラベル -->
  <text x="450" y="340" font-size="14" text-anchor="middle" fill="#FFF" font-weight="bold">改良土（高植え部）</text>

  <!-- タイトル -->
  <text x="450" y="30" font-size="24" font-weight="bold" text-anchor="middle">ヤマモモ地上部断面図</text>
  <text x="450" y="55" font-size="16" text-anchor="middle">マルチング構造（高植え+10-20cm）</text>

  <!-- 凡例 -->
  <rect x="20" y="480" width="250" height="150" fill="#FFF" stroke="#000" stroke-width="2" rx="5"/>
  <text x="30" y="500" font-size="16" font-weight="bold">凡例</text>

  <rect x="30" y="510" width="20" height="15" fill="#F4A460" stroke="#D2691E" stroke-width="1"/>
  <text x="55" y="522" font-size="13">砂（幹周り0-15cm）</text>

  <rect x="30" y="535" width="20" height="15" fill="#A0522D" stroke="#654321" stroke-width="1"/>
  <text x="55" y="547" font-size="13">バークチップ（15-50cm、10cm厚）</text>

  <rect x="30" y="560" width="20" height="15" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
  <text x="55" y="572" font-size="13">クローバー（50-150cm）</text>

  <rect x="30" y="585" width="20" height="15" fill="#9CCC65" stroke="#558B2F" stroke-width="1"/>
  <text x="55" y="597" font-size="13">粘土団子エリア（150cm以遠）</text>

  <rect x="30" y="610" width="20" height="15" fill="#654321" stroke="#000" stroke-width="1"/>
  <text x="55" y="622" font-size="13">改良土（高植え部）</text>
</svg>
    </div>
</body>
</html>
